name: Test

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        description: 'Python version to use'
        required: false
        default: '3.12'
      aws_region:
        description: 'AWS Region'
        required: true
        type: string
      role_to_assume:
        description: 'AWS Role to Assume'
        required: true
        type: string
      aws_account_id_dev:
        description: 'AWS Account ID for development'
        type: string
        default: '905418256626'
      artifact_domain:
        description: 'AWS CodeArtifact domain'
        type: string
        default: 'cabernetai'
      runner:
        description: 'GitHub Actions runner label (e.g. ubuntu-latest, ubuntu-latest-8-cores)'
        type: string
        required: false
        default: 'ubuntu-latest'
      xdist_workers:
        description: 'Number of pytest-xdist workers (0 to disable parallelism)'
        type: string
        required: false
        default: '0'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements_test.txt

      - name: Run tests with coverage
        run: |
          XDIST_FLAG=""
          if [ "${{ inputs.xdist_workers }}" != "0" ] && python -c "import xdist" 2>/dev/null; then
            XDIST_FLAG="-n ${{ inputs.xdist_workers }}"
          fi
          pytest --cov --cov-config=.coveragerc --cov-report=term-missing:skip-covered $XDIST_FLAG
