name: Test

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        description: 'Python version to use'
        required: false
        default: '3.12'
      aws_region:
        description: 'AWS Region'
        required: true
        type: string
      role_to_assume:
        description: 'AWS Role to Assume'
        required: true
        type: string
      aws_account_id_dev:
        description: 'AWS Account ID for development'
        type: string
        default: '905418256626'
      artifact_domain:
        description: 'AWS CodeArtifact domain'
        type: string
        default: 'cabernetai'
      runner:
        description: 'GitHub Actions runner label (e.g. ubuntu-latest, ubuntu-latest-8-cores)'
        type: string
        required: false
        default: 'ubuntu-latest'
      xdist_workers:
        description: 'Number of pytest-xdist workers (0 to disable parallelism)'
        type: string
        required: false
        default: '0'
      requirements_files:
        description: 'Newline-delimited list of pip requirements files to install'
        type: string
        required: false
        default: "requirements.txt\ntests/requirements_test.txt"
      coverage_min:
        description: 'Minimum coverage % (empty = no enforcement, e.g. "81")'
        type: string
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install dependencies
        env:
          REQUIREMENTS_FILES: ${{ inputs.requirements_files }}
        run: |
          python -m pip install --upgrade pip
          echo "$REQUIREMENTS_FILES" | while IFS= read -r file; do
            [ -n "$file" ] && pip install -r "$file"
          done

      - name: Run tests with coverage
        env:
          XDIST_WORKERS: ${{ inputs.xdist_workers }}
          COVERAGE_MIN: ${{ inputs.coverage_min }}
        run: |
          XDIST_FLAG=""
          if [ "$XDIST_WORKERS" != "0" ] && python -c "import xdist" 2>/dev/null; then
            XDIST_FLAG="-n $XDIST_WORKERS"
          fi
          COV_MIN_FLAG=""
          if [ -n "$COVERAGE_MIN" ]; then
            if ! echo "$COVERAGE_MIN" | grep -qE '^[0-9]+$'; then
              echo "::error::coverage_min must be a numeric value, got: $COVERAGE_MIN"
              exit 1
            fi
            COV_MIN_FLAG="--cov-fail-under=$COVERAGE_MIN"
          fi
          pytest --cov --cov-config=.coveragerc --cov-report=term-missing:skip-covered $XDIST_FLAG $COV_MIN_FLAG
